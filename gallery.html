<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View our gallery to see our security personnel, operations, and equipment in action. Vuyani & Soks Security - excellence in protection.">
    <meta name="keywords" content="security gallery, security photos, Vuyani & Soks images, security operations gallery">
    <meta name="author" content="Vuyani & Soks Security">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Vuyani & Soks Security - Gallery">
    <meta property="og:description" content="See our team and operations in action. Professional security services gallery.">
    <meta property="og:image" content="IMAGES/logo.png">

    <title>Vuyani & Soks Security - Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="body-overlay">
        <header>
            <div class="container">
                <nav>
                    <div class="logo-container">
                        <img src="IMAGES/logo.png" alt="Vuyani & Soks Security Logo" class="logo-img">
                        <div class="brand-name">Vuyani & Soks</div>
                    </div>
                    <ul class="nav-links">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="services.html">Services</a></li>
                        <li><a href="gallery.html" class="active">Gallery</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                    <div class="theme-switch-wrapper">
                        <label class="theme-switch" for="checkbox">
                            <input type="checkbox" id="checkbox" />
                            <div class="slider">
                                <i class="fas fa-sun icon sun"></i>
                                <i class="fas fa-moon icon moon"></i>
                            </div>
                        </label>
                    </div>
                    <div class="burger">
                        <div class="line1"></div>
                        <div class="line2"></div>
                        <div class="line3"></div>
                    </div>
                </nav>
            </div>
        </header>

        <main>
            <section class="gallery">
                <div class="container">
                    <div class="section-title">
                        <h2>Our Gallery</h2>
                        <div class="line"></div>
                        <p style="text-align: center; margin-top: 15px;">A glimpse into our operations and dedicated team.</p>
                    </div>

                    <div class="gallery-grid">
                        <div class="gallery-item">
                            <img src="IMAGES/Screenshot 2026-01-06 151345.png" alt="Security Operation 1">
                            <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                        </div>
                        <div class="gallery-item">
                            <img src="IMAGES/Screenshot 2026-01-06 151400.png" alt="Security Operation 2">
                            <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                        </div>
                        <div class="gallery-item">
                            <img src="IMAGES/Screenshot 2026-01-06 151529.png" alt="Security Operation 3">
                            <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                        </div>
                        <div class="gallery-item">
                            <img src="IMAGES/Screenshot 2026-01-06 152810.png" alt="Security Operation 4">
                            <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                        </div>
                        <div class="gallery-item">
                            <img src="IMAGES/Screenshot 2026-01-06 152940.png" alt="Security Operation 5">
                            <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                        </div>
                        <div class="gallery-item">
                            <img src="IMAGES/Screenshot 2026-01-06 153008.png" alt="Security Operation 6">
                            <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                        </div>
                        <div class="gallery-item">
                            <img src="IMAGES/Screenshot 2026-01-06 153113.png" alt="Security Operation 7">
                            <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Lightbox Modal -->
        <div id="lightbox" class="lightbox">
            <span class="close-lightbox">&times;</span>
            <div class="lightbox-content">
                <img id="lightbox-img" src="" alt="Lightbox Image">
                <div class="lightbox-controls">
                    <span class="prev-slide"><i class="fas fa-chevron-left"></i></span>
                    <span class="next-slide"><i class="fas fa-chevron-right"></i></span>
                </div>
                <div class="lightbox-caption"></div>
            </div>
        </div>

        <footer>
            <div class="container">
                <p>&copy; 2026 Vuyani & Soks Security. All rights reserved.</p>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
